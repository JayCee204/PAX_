<body>

    <main class="chat-wrapper">
        <div class="chat-container">
            <div class="chat-header">P.A.X</div>

            <div class="chat-box" id="chatBox">
                <div class="bot-message">
                    Hello! I am P.A.X. How can I help you today?
                </div>
            </div>

            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Ask PAX about your status...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>
