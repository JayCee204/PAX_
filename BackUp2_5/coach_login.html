<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAX | Coach Login</title>
    <link rel="stylesheet" href="coach_login_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-logo">
            <span class="brand-text">PA<span class="xclass">X</span></span>
        </div>
        
        <div class="login-header">
            <h2>COMMAND YOUR ATHLETES</h2>
            <p>Enter Credentials to Access Platform</p>
        </div>

        <div id="errorMessage" class="error-box"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="coachId" placeholder="UserName" required>
            </div>
            <div class="input-group">
                <label>PassWord</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Club Code</label>
                <input type="text" id="clubCode" placeholder="Enter Club Code" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">LOG IN</button>
        </form>
    </div>

    <div id="successToast" class="notification">
        <div class="content">
            <i class="fa-solid fa-circle-check toast-icon"></i>
            <div class="toast-text">
                <strong>LOGIN SUCCESSFUL</strong>
                <span>Welcome back COACH JESSE</span>
            </div>
        </div>
        <div class="toast-progress"></div>
    </div>

    <script src="coach_login_script.js"></script>
</body>
</html>
