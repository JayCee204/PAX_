<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAX | Athlete Dashboard</title>
    <link rel="stylesheet" href="student_style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="user-profile">
                <h3>.</h3>
                <div>
                    <span>Welcome back,</span>
                    <h2>Marcus Thorne</h2>
                </div>
            </div>
            <a href="message.html">
                <div class="notification-icon">🔔</div>
            </a>
        </header>

        <section class="daily-summary">
            <div class="progress-circle">
                <div class="inner-circle">
                    <span class="percentage">82%</span>
                    <span class="label">Daily Goal</span>
                </div>
            </div>
            <div class="quick-stats">
                <div class="stat-item"><strong>2,450</strong><span>Kcal</span></div>
                <div class="stat-item"><strong>12.4</strong><span>km</span></div>
                <div class="stat-item"><strong>142</strong><span>BPM</span></div>
            </div>
        </section>

        <section class="activity-feed">
            <a href="jog_i.html">
                <h3>SESSIONS</h3>
                <div class="activity-card">
                    <div class="icon-box sprint">🏃</div>
                    <div class="activity-details">
                        <h4>SPRINTING</h4>
                    </div>
                </div>

            <a href="exercise.html">
                <div class="activity-card">
                    <div class="icon-box strength">🏋️</div>
                    <div class="activity-details">
                        <h4>WorkOut Routine</h4>
                    </div>
                </div>
            </a>
        </section>

        <nav class="bottom-nav">
            <a href="student.html" class="nav-item active">🏠<span>Home</span></a>
            <a href="stat.html" class="nav-item">📊<span>Stats</span></a>
            <a href="#" class="nav-item plus-btn">+</a>
            <a href="#" class="nav-item">🏆<span>Ranks</span></a>
            <a href="#" class="nav-item">⚙️<span>Profile</span></a>
        </nav>
    </div>

    <script src="student_script.js"></script>
</body>
</html>
